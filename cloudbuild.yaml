steps:
  # Build Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/finpulse-backend', './backend']
    dir: 'backend'
  
  # Build Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/finpulse-frontend', './frontend']
    dir: 'frontend'

  # Build AI Engine
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/finpulse-ai-engine', './ai-engine']
    dir: 'ai-engine'

images:
  - 'gcr.io/$PROJECT_ID/finpulse-backend'
  - 'gcr.io/$PROJECT_ID/finpulse-frontend'
  - 'gcr.io/$PROJECT_ID/finpulse-ai-engine'
